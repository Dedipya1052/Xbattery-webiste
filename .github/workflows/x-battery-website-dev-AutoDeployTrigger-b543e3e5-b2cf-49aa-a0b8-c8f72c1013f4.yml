name: Trigger auto deployment for x-battery-website-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ dev ]
    paths:
    - '**'
    - '.github/workflows/x-battery-website-dev-AutoDeployTrigger-b543e3e5-b2cf-49aa-a0b8-c8f72c1013f4.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.XBATTERYWEBSITEDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.XBATTERYWEBSITEDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.XBATTERYWEBSITEDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: xbattery.azurecr.io
          registryUsername: ${{ secrets.XBATTERYWEBSITEDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.XBATTERYWEBSITEDEV_REGISTRY_PASSWORD }}
          containerAppName: x-battery-website-dev
          resourceGroup: BESS
          imageToBuild: xbattery.azurecr.io/x-battery-website-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


