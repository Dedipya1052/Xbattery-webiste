name: Trigger auto deployment for x-battery-website

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/x-battery-website-AutoDeployTrigger-e6937244-87a4-4fd8-b062-ef721b9252a7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.XBATTERYWEBSITE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.XBATTERYWEBSITE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.XBATTERYWEBSITE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: xbattery.azurecr.io
          registryUsername: ${{ secrets.XBATTERYWEBSITE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.XBATTERYWEBSITE_REGISTRY_PASSWORD }}
          containerAppName: x-battery-website
          resourceGroup: BESS
          imageToBuild: xbattery.azurecr.io/x-battery-website:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


