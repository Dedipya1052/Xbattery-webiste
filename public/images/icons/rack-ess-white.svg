<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 64 64" fill="none">
  <!-- Rack Energy Storage System icon (white strokes for dark chip) -->
  <!-- Outer rack cabinet -->
  <rect x="8" y="6" width="48" height="52" rx="2" ry="2" stroke="white" stroke-width="3"/>
  <!-- Side ventilation slots -->
  <g stroke="white" stroke-width="2" stroke-linecap="round">
    <path d="M12 14h8M12 20h8M12 26h8M12 32h8M12 38h8M12 44h8"/>
  </g>
  <!-- Vertical divider mimicking frame -->
  <path d="M24 6v52" stroke="white" stroke-width="2"/>
  <!-- Battery rack shelves (drawers/modules) -->
  <g stroke="white" stroke-width="2" fill="none">
    <rect x="28" y="10" width="24" height="6" rx="1"/>
    <rect x="28" y="18" width="24" height="6" rx="1"/>
    <rect x="28" y="26" width="24" height="6" rx="1"/>
    <rect x="28" y="34" width="24" height="6" rx="1"/>
    <rect x="28" y="42" width="24" height="6" rx="1"/>
    <rect x="28" y="50" width="24" height="6" rx="1"/>
  </g>
  <!-- Lightning glyph on door -->
  <path d="M20 46l-4 6h4l-3 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

